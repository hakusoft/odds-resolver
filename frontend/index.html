<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OddsResolver</title>
  <style>
    :root {
      color-scheme: light dark;
      --surface-1: #fcfcfb;
      --surface-2: #f0efec;
      --text-primary: #0b0b0b;
      --text-secondary: #52514e;
      --border: #d8d7d2;
      --accent: #2a78d6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --surface-1: #1a1a19;
        --surface-2: #262625;
        --text-primary: #ffffff;
        --text-secondary: #c3c2b7;
        --border: #3d3d3a;
        --accent: #3987e5;
      }
    }
    body {
      margin: 0;
      background: var(--surface-1);
      color: var(--text-primary);
      font-family: system-ui, sans-serif;
      line-height: 1.5;
    }
    main { max-width: 900px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    h1 { font-size: 1.4rem; letter-spacing: 0.04em; margin: 0; }
    .tagline { color: var(--text-secondary); font-size: 0.85rem; margin: 0.2rem 0 1.5rem; }
    .date { font-size: 0.9rem; color: var(--text-secondary); margin: 0 0 1rem; }

    .venue { margin-bottom: 1.5rem; }
    .venue h2 {
      font-size: 1.05rem;
      margin: 0 0 0.5rem;
      padding-bottom: 0.3rem;
      border-bottom: 2px solid var(--border);
    }
    .races { display: grid; gap: 0.4rem; }
    .race-link {
      display: flex;
      align-items: baseline;
      gap: 0.7rem;
      padding: 0.55rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      text-decoration: none;
      color: var(--text-primary);
      background: var(--surface-1);
    }
    .race-link:hover, .race-link:focus-visible {
      border-color: var(--accent);
      background: var(--surface-2);
    }
    .race-no {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      min-width: 2.6em;
      color: var(--accent);
    }
    .race-name { flex: 1; }
    .race-sub { color: var(--text-secondary); font-size: 0.8rem; white-space: nowrap; }
  </style>
</head>
<body>
  <main>
    <h1>Odds<span style="opacity:.55">Resolver</span></h1>
    <p class="tagline">数字の羅列を、動きと歪みの地図へ。</p>
    <p class="date" id="date">読み込み中…</p>
    <div id="venues"></div>
  </main>

  <script>
    async function main() {
      const res = await fetch("data/index.json");
      if (!res.ok) throw new Error(`目次の取得に失敗 (${res.status})`);
      const idx = await res.json();

      document.getElementById("date").textContent = `${idx.date} の開催`;

      // データ側はフラット。venue でのグループ化は表示の都合なのでここでやる。
      const byVenue = new Map();
      for (const r of idx.races) {
        if (!byVenue.has(r.venue)) byVenue.set(r.venue, []);
        byVenue.get(r.venue).push(r);
      }

      const root = document.getElementById("venues");
      for (const [venue, races] of byVenue) {
        const sec = document.createElement("section");
        sec.className = "venue";
        const h2 = document.createElement("h2");
        h2.textContent = venue;
        sec.appendChild(h2);

        const list = document.createElement("div");
        list.className = "races";
        for (const r of races) {
          const a = document.createElement("a");
          a.className = "race-link";
          a.href = `race.html?id=${encodeURIComponent(r.race_id)}`;

          const no = document.createElement("span");
          no.className = "race-no";
          no.textContent = `${r.race_no}R`;
          const name = document.createElement("span");
          name.className = "race-name";
          name.textContent = r.name;
          const sub = document.createElement("span");
          sub.className = "race-sub";
          sub.textContent = `発走 ${r.post_time} / ${r.n_horses}頭`;

          a.append(no, name, sub);
          list.appendChild(a);
        }
        sec.appendChild(list);
        root.appendChild(sec);
      }
    }

    main().catch(e => {
      document.getElementById("date").textContent = "読み込みに失敗: " + e.message;
    });
  </script>
</body>
</html>
