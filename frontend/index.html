<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OddsResolver</title>
  <style>
    :root {
      color-scheme: light dark;
      --fg: #1a1a2e;
      --bg: #f5f5f7;
      --accent: #3b6ea5;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #e8e8ef;
        --bg: #14141f;
        --accent: #7fb0e0;
      }
    }
    body {
      margin: 0;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--fg);
      font-family: system-ui, sans-serif;
    }
    main { text-align: center; padding: 2rem; }
    h1 { font-size: 1.8rem; letter-spacing: 0.04em; }
    h1 span { color: var(--accent); }
    p { opacity: 0.7; }
  </style>
</head>
<body>
  <main>
    <h1>Odds<span>Resolver</span></h1>
    <p>数字の羅列を、動きと歪みの地図へ。</p>
    <p>準備中 — 配信基盤の疎通確認ページ</p>
  </main>
</body>
</html>
