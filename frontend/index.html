<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OddsResolver</title>
  <style>
    :root {
      color-scheme: light dark;
      --surface-1: #fcfcfb;
      --surface-2: #f0efec;
      --text-primary: #0b0b0b;
      --text-secondary: #52514e;
      --border: #d8d7d2;
      --accent: #2a78d6;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --surface-1: #1a1a19;
        --surface-2: #262625;
        --text-primary: #ffffff;
        --text-secondary: #c3c2b7;
        --border: #3d3d3a;
        --accent: #3987e5;
      }
    }
    :root[data-theme="light"] {
      --surface-1: #fcfcfb;
      --surface-2: #f0efec;
      --text-primary: #0b0b0b;
      --text-secondary: #52514e;
      --border: #d8d7d2;
      --accent: #2a78d6;
    }
    :root[data-theme="dark"] {
      --surface-1: #1a1a19;
      --surface-2: #262625;
      --text-primary: #ffffff;
      --text-secondary: #c3c2b7;
      --border: #3d3d3a;
      --accent: #3987e5;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--surface-1);
      color: var(--text-primary);
      font-family: system-ui, sans-serif;
      line-height: 1.5;
    }
    main { max-width: 760px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }
    h1 { font-size: 1.4rem; letter-spacing: 0.04em; margin: 0; }
    .tagline { color: var(--text-secondary); font-size: 0.85rem; margin: 0.2rem 0 1.25rem; }
    .date { font-size: 0.9rem; color: var(--text-secondary); margin: 0 0 0.9rem; }

    /* 会場タブ */
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      margin: 0 0 1rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.6rem;
    }
    .tab {
      appearance: none;
      border: 1px solid var(--border);
      background: var(--surface-1);
      color: var(--text-secondary);
      font: inherit;
      font-size: 0.9rem;
      letter-spacing: 0.02em;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      cursor: pointer;
    }
    .tab:hover { border-color: var(--accent); color: var(--text-primary); }
    .tab[aria-selected="true"] {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 600;
    }
    .tab .count {
      font-variant-numeric: tabular-nums;
      font-size: 0.78rem;
      opacity: 0.7;
      margin-left: 0.35em;
    }
    .tab:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* レース行 */
    .races { display: flex; flex-direction: column; }
    .race-link {
      display: grid;
      grid-template-columns: 2.6em 1fr auto;
      align-items: center;
      gap: 0.7rem;
      padding: 0.6rem 0.6rem;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--text-primary);
    }
    .race-link:first-child { border-top: 1px solid var(--border); }
    .race-link:hover, .race-link:focus-visible {
      background: var(--surface-2);
      outline: none;
    }
    .race-no {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--accent);
      text-align: right;
    }
    .race-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;
    }
    .race-sub {
      color: var(--text-secondary);
      font-size: 0.8rem;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }
    .empty { color: var(--text-secondary); padding: 1rem 0; }
  </style>
</head>
<body>
  <main>
    <h1>Odds<span style="opacity:.55">Resolver</span></h1>
    <p class="tagline">数字の羅列を、動きと歪みの地図へ。</p>
    <p class="date" id="date">読み込み中…</p>
    <div class="tabs" id="tabs" role="tablist" aria-label="開催会場"></div>
    <div class="races" id="races" role="tabpanel"></div>
  </main>

  <script>
    // 生表記のレース名から、表示用に先頭の条件部分だけを取り出す。
    // 例: "Ｃ３三　Ｃ３三　３歳以上" → "Ｃ３三"。データ側は生表記のまま保持する。
    function shortName(name) {
      if (!name) return "";
      const head = name.split(/[　\s]+/).filter(Boolean)[0] || name;
      // 先頭語が短すぎる（記号1個など）ときは2語目まで拾って情報量を確保。
      const parts = name.split(/[　\s]+/).filter(Boolean);
      let label = parts[0] || name;
      if (label.length <= 2 && parts[1] && parts[1] !== parts[0]) {
        label = parts[0] + " " + parts[1];
      }
      return label;
    }

    let byVenue = new Map();
    let venues = [];

    function selectVenue(venue) {
      // タブの選択状態
      for (const btn of document.querySelectorAll(".tab")) {
        btn.setAttribute("aria-selected", String(btn.dataset.venue === venue));
      }
      // URL ハッシュにタブを反映（リロード・共有でタブ維持）
      const enc = encodeURIComponent(venue);
      if (decodeURIComponent(location.hash.slice(1)) !== venue) {
        history.replaceState(null, "", "#" + enc);
      }

      const races = byVenue.get(venue) || [];
      const panel = document.getElementById("races");
      panel.innerHTML = "";
      if (races.length === 0) {
        const p = document.createElement("p");
        p.className = "empty";
        p.textContent = "この会場のレースはありません。";
        panel.appendChild(p);
        return;
      }
      for (const r of races) {
        const a = document.createElement("a");
        a.className = "race-link";
        a.href = `race.html?id=${encodeURIComponent(r.race_id)}`;

        const no = document.createElement("span");
        no.className = "race-no";
        no.textContent = `${r.race_no}R`;

        const name = document.createElement("span");
        name.className = "race-name";
        name.textContent = shortName(r.name);
        name.title = r.name; // 生表記全文はツールチップで確認できる

        const sub = document.createElement("span");
        sub.className = "race-sub";
        sub.textContent = `${r.post_time} ・ ${r.n_horses}頭`;

        a.append(no, name, sub);
        panel.appendChild(a);
      }
    }

    async function main() {
      const res = await fetch("data/index.json");
      if (!res.ok) throw new Error(`目次の取得に失敗 (${res.status})`);
      const idx = await res.json();

      document.getElementById("date").textContent = `${idx.date} の開催`;

      // データ側はフラット。venue でのグループ化と R 番号ソートは表示の都合。
      byVenue = new Map();
      for (const r of idx.races) {
        if (!byVenue.has(r.venue)) byVenue.set(r.venue, []);
        byVenue.get(r.venue).push(r);
      }
      for (const races of byVenue.values()) {
        races.sort((a, b) => a.race_no - b.race_no);
      }
      venues = [...byVenue.keys()];

      // タブを描く
      const tabs = document.getElementById("tabs");
      for (const venue of venues) {
        const btn = document.createElement("button");
        btn.className = "tab";
        btn.type = "button";
        btn.setAttribute("role", "tab");
        btn.dataset.venue = venue;
        btn.setAttribute("aria-selected", "false");
        const label = document.createElement("span");
        label.textContent = venue;
        const cnt = document.createElement("span");
        cnt.className = "count";
        cnt.textContent = `${byVenue.get(venue).length}R`;
        btn.append(label, cnt);
        btn.addEventListener("click", () => selectVenue(venue));
        tabs.appendChild(btn);
      }

      // 初期タブ: URL ハッシュがあればそれ、無ければ先頭会場
      const fromHash = decodeURIComponent(location.hash.slice(1));
      const initial = venues.includes(fromHash) ? fromHash : venues[0];
      if (initial) selectVenue(initial);
    }

    main().catch(e => {
      document.getElementById("date").textContent = "読み込みに失敗: " + e.message;
    });
  </script>
</body>
</html>
